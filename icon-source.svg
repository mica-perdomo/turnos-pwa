<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="210"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- 3 segments (clock-style, top = 12 o'clock) -->
  <g clip-path="url(#circle)">
    <!-- Red segment: 1er turno (06:00-14:00) → 120° from top-right -->
    <path d="M256,256 L256,46 A210,210 0 0,1 437.9,361Z" fill="#ef4444"/>
    <!-- Green segment: 2do turno (14:00-22:00) → 120° from bottom-right -->
    <path d="M256,256 L437.9,361 A210,210 0 0,1 74.1,361Z" fill="#22c55e"/>
    <!-- Blue segment: 3er turno (22:00-06:00) → 120° from bottom-left -->
    <path d="M256,256 L74.1,361 A210,210 0 0,1 256,46Z" fill="#3b82f6"/>
  </g>

  <!-- Center circle -->
  <circle cx="256" cy="256" r="60" fill="#0f172a"/>

  <!-- Clock hands -->
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="150" stroke="#f8fafc" stroke-width="14" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="330" y2="210" stroke="#f8fafc" stroke-width="10" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="#f8fafc"/>

  <!-- Subtle segment divider lines -->
  <line x1="256" y1="256" x2="256" y2="46" stroke="#0f172a" stroke-width="4"/>
  <line x1="256" y1="256" x2="437.9" y2="361" stroke="#0f172a" stroke-width="4"/>
  <line x1="256" y1="256" x2="74.1" y2="361" stroke="#0f172a" stroke-width="4"/>
</svg>
